name: drnirmal_app
description: "Professional App for Dr. Nirmal Lamichhane"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  google_generative_ai: ^0.4.5
  
  # New Gallery & Offline Storage Dependencies [cite: 2026-03-11]
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  khalti: ^2.0.0 
  http: ^1.2.0
  provider: ^6.1.2
  sqflite: ^2.3.3
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  intl: ^0.19.0
  fl_chart: ^0.66.0

dependency_overrides:
  device_info_plus: ^10.1.0
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  # Ensure assets folder has logo.png
  assets:
    - assets/logo.png
    # If you have a specific background for drawer, add it here
    # - assets/drawer_bg.png

# App Icon Config (Dr. Nirmal's Professional Icon)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 

# Splash Screen Config (Dr. Nirmal's Professional Blue)
flutter_native_splash:
  color: "#003d80"
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#003d80"
  fullscreen: true